name: Label AI-generated PRs

on:
    pull_request_target:
        types: [opened, reopened, synchronize]

permissions:
    contents: read
    pull-requests: write

jobs:
    label:
        runs-on: ubuntu-latest
        steps:
            - uses: sargunv/ai-pr-detector@64b95ea7b4b037eec2a4c7afb62e117fc006d77e # v0.1.0
              with:
                  label: ai-generated
